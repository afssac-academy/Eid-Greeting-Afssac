<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة أكاديمية العرب - عيد الفطر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card-container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 380px; }
        .logo { width: 90px; margin-bottom: 15px; }
        h2 { color: #1a5e3a; font-size: 22px; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 18px; text-align: center; margin-bottom: 20px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #1a5e3a; }
        .btn { border: none; padding: 15px; border-radius: 12px; font-size: 18px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; font-family: 'Tajawal', sans-serif; }
        .btn-green { background: #1a5e3a; color: white; }
        .btn-red { background: #d1202f; color: white; margin-top: 15px; }
        .btn-gray { background: #666; color: white; margin-top: 10px; }
        #output-section { display: none; }
        canvas { width: 100%; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); background: #fff; }
    </style>
</head>
<body>

<div class="card-container" id="input-section">
    <img src="logo.png" class="logo" onerror="this.style.display='none'">
    <h2>تهنئة عيد الفطر المبارك</h2>
    <input type="text" id="userName" placeholder="اكتب الاسم هنا..." maxlength="35">
    <button class="btn btn-green" onclick="createGreeting()">إنشاء البطاقة</button>
</div>

<div class="card-container" id="output-section">
    <canvas id="greetingCanvas"></canvas>
    <button class="btn btn-red" onclick="downloadGreeting()">تحميل الصورة</button>
    <button class="btn btn-gray" onclick="location.reload()">تعديل الاسم</button>
</div>

<script>
    const canvas = document.getElementById('greetingCanvas');
    const ctx = canvas.getContext('2d');
    const bgImage = new Image();
    
    // تأكد أن ملف الصورة بجانب هذا الملف واسمه Card.jpg
    bgImage.src = 'Card.jpg';

    function createGreeting() {
        const name = document.getElementById('userName').value.trim();
        if (!name) {
            alert("من فضلك أدخل الاسم أولاً");
            return;
        }

        // إعداد أبعاد الكانفاس لتطابق جودة الصورة
        canvas.width = 1080;
        canvas.height = 1920;

        // التأكد من تحميل الصورة قبل الرسم
        if (bgImage.complete) {
            drawEverything(name);
        } else {
            bgImage.onload = () => drawEverything(name);
        }
    }

    function drawEverything(name) {
        // رسم الخلفية
        ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

        // إعدادات الخط: أسود، عريض، يشبه الصورة المطلوبة
        ctx.fillStyle = "#000000";
        ctx.textAlign = "center";
        ctx.font = "bold 85px 'Tajawal', sans-serif";

        // تحديد موقع الاسم (تحت "كل عام وأنتم بخير" بمسافتين)
        // الإحداثي 1410 يمثل حوالي 73.5% من الارتفاع
        ctx.fillText(name, canvas.width / 2, 1410);

        // التبديل بين الواجهات
        document.getElementById('input-section').style.display = 'none';
        document.getElementById('output-section').style.display = 'block';
    }

    function downloadGreeting() {
        const link = document.createElement('a');
        link.download = 'Eid_Greeting_AFSSAC.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>

</body>
</html>
