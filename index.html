<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معايدة أفساك السنوية</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            overflow: hidden; /* لمنع السكرول أثناء حركة الستارة */
        }

        /* ----- 1. واجهة الستارة الترحيبية الكاملة ----- */
        .curtain-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            display: flex;
            pointer-events: none;
        }

        /* تأثير الستارة القماشية المنقسمة */
        .curtain-half {
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, 
                #083b28 0%, #0d5c3f 12%, #0a4731 25%, 
                #0d5c3f 38%, #083b28 50%, #0d5c3f 62%, 
                #0a4731 75%, #0d5c3f 88%, #083b28 100%);
            background-size: 20% 100%;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            pointer-events: auto;
            transition: transform 1.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .left-curtain { transform-origin: left center; }
        .right-curtain { transform-origin: right center; }

        /* حركة فتح الستارة الحقيقية (كشكشة وانكماش للأطراف) */
        .curtain-wrapper.open .left-curtain { transform: scaleX(0) skewY(-5deg); opacity: 0; }
        .curtain-wrapper.open .right-curtain { transform: scaleX(0) skewY(5deg); opacity: 0; }

        /* محتويات فوق الستارة (قبل الفتح) */
        .curtain-welcome-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            text-align: center;
            width: 100%;
            transition: opacity 0.6s ease, transform 0.6s ease;
            pointer-events: auto;
        }

        /* جعل اللوجو يظهر شفافاً بدون خلفية بيضاء على الستارة */
        .curtain-welcome-box img {
            width: 140px;
            margin-bottom: 20px;
            mix-blend-mode: multiply; /* ميزة ذكية لإخفاء أي خلفية بيضاء زائدة باللوجو */
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.4));
        }

        .curtain-welcome-text {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* اختفاء المحتوى الترحيبي مع بدء الفتح */
        .curtain-wrapper.open .curtain-welcome-box {
            opacity: 0;
            transform: translate(-50%, -60%) scale(0.8);
            pointer-events: none;
        }


        /* ----- 2. الصفحة الأولى (مربع إدخال الاسم بعد فتح الستارة) ----- */
        .first-page {
            width: 90%;
            max-width: 420px;
            background: #fff;
            padding: 35px 25px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            display: block;
            z-index: 1;
        }

        .first-page .logo {
            width: 110px;
            margin-bottom: 20px;
        }

        .first-page .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #0b1a30;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #dcdcdc;
            font-size: 18px;
            outline: none;
            margin-bottom: 25px;
            text-align: center;
            color: #333;
        }

        .show-btn {
            background: #0d5c3f;
            color: #fff;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
        }


        /* ----- 3. الصفحة الثانية (عرض الكارت النهائي وحفظه) ----- */
        .second-page {
            display: none; 
            width: 100vw;
            max-width: 500px;
            text-align: center;
            padding: 10px;
        }

        .card-container {
            width: 100%;
            position: relative;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .card-container img {
            width: 100%;
            height: auto; /* الحفاظ الكامل على أبعاد الصورة الأصلية ومنع المط */
            display: block;
        }

        /* مكان الاسم الموزون بدقة بالغة فوق الـ 1447 هـ */
        .name-box {
            position: absolute;
            bottom: 9.5%; 
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            color: #000;
            padding: 0 15px;
            direction: rtl;
        }

        .save-btn {
            background: #107c41;
            color: #fff;
            margin-top: 15px;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(16, 124, 65, 0.3);
        }
    </style>
</head>

<body>

    <div class="curtain-wrapper" id="curtainWrapper">
        <div class="curtain-welcome-box">
            <img src="logo.png" alt="لوجو أفساك">
            <div class="curtain-text curtain-welcome-text">مرحبا بكم في أفساك</div>
        </div>
        <div class="curtain-half left-curtain"></div>
        <div class="curtain-half right-curtain"></div>
    </div>

    <section class="first-page" id="firstPage">
        <img src="logo.png" class="logo" alt="الشعار">
        <div class="title">معايدة أفساك السنوية</div>
        <input type="text" id="nameInput" placeholder="اكتب الاسم هنا" maxlength="40">
        <button class="show-btn" onclick="showGreeting()">عرض المعايدة</button>
    </section>

    <section class="second-page" id="secondPage">
        <div class="card-container" id="cardCapture">
            <img src="Card.jpg" alt="بطاقة التهنئة">
            <div class="name-box" id="userName"></div>
        </div>
        <button class="save-btn" onclick="downloadCard()">حفظ المعايدة كصورة 💾</button>
    </section>

    <script>
        // إطلاق حركة فتح الستارة تلقائياً بعد ثانية ونصف من دخول الموقع
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const curtainWrapper = document.getElementById('curtainWrapper');
                curtainWrapper.classList.add('open');
                
                // السماح بالسكرول بعد انتهاء الحركة تماماً
                setTimeout(() => {
                    document.body.style.overflow = 'auto';
                }, 1800);
            }, 1500); // تظل الستارة واللوجو والترحيب ظاهرين لثانية ونصف ثم يبدأ الفتح
        });

        function showGreeting() {
            let enteredName = document.getElementById("nameInput").value.trim();

            if (enteredName === "") {
                alert("الرجاء كتابة الاسم أولاً لعرض المعايدة.");
                return;
            }

            document.getElementById("userName").innerText = enteredName;
            document.getElementById("firstPage").style.display = "none";
            document.getElementById("secondPage").style.display = "block";
            
            window.scrollTo(0, 0);
        }

        // تحويل الكارت وصنع الصورة للتحميل بجودة عالية
        function downloadCard() {
            let enteredName = document.getElementById("nameInput").value.trim();
            const cardElement = document.getElementById('cardCapture');
            const saveBtn = document.querySelector('.save-btn');
            
            saveBtn.innerText = "جاري التحضير والحفظ...";
            saveBtn.style.opacity = "0.7";

            html2canvas(cardElement, {
                useCORS: true,
                scale: 3, 
                allowTaint: true
            }).then(canvas => {
                const image = canvas.toDataURL('image/jpeg', 1.0);
                const link = document.createElement('a');
                link.download = `معايدة_أفساك_${enteredName}.jpg`;
                link.href = image;
                link.click();

                saveBtn.innerText = "حفظ المعايدة كصورة 💾";
                saveBtn.style.opacity = "1";
            }).catch(err => {
                alert("عذراً، حدث خطأ أثناء الحفظ، يرجى المحاولة مجدداً.");
                saveBtn.innerText = "حفظ المعايدة كصورة 💾";
                saveBtn.style.opacity = "1";
            });
        }
    </script>

</body>
</html>
