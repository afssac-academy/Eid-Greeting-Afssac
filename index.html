<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معايدة أفساك السنوية</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
        }

        /* الصفحة الأولى (واجهة كتابة الاسم) */
        .first-page {
            width: 90%;
            max-width: 420px;
            background: #fff;
            padding: 35px 25px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            display: block;
        }

        .logo {
            width: 110px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #0b1a30;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #dcdcdc;
            font-size: 18px;
            outline: none;
            margin-bottom: 25px;
            text-align: center;
            color: #333;
        }

        .buttons {
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
        }

        .show-btn {
            background: #0d5c3f;
            color: #fff;
        }

        .whatsapp-btn {
            background: #25D366;
            color: #fff;
        }

        /* الصفحة الثانية (تأمين أبعاد الصورة لمنع المط) */
        .second-page {
            display: none; 
            width: 100vw;
            max-width: 500px; /* الحجم المثالي لأبعاد كروت الجوال */
            position: relative;
            background: #fff;
        }

        .second-page img {
            width: 100%;
            height: auto; /* الحفاظ التام على أبعاد التصميم الأصلية ومنع المط */
            display: block;
        }

        /* ميزان موقع الاسم ليكون في المساحة البيضاء المحددة بدقة */
        .name-box {
            position: absolute;
            bottom: 9.5%; /* تم إنزاله بدقة ليتوسط الفراغ تماماً فوق التاريخ */
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 26px; /* حجم الخط واضح وعريض */
            font-weight: 700;
            color: #000;
            padding: 0 15px;
            direction: rtl;
        }
    </style>
</head>

<body>

    <section class="first-page" id="firstPage">
        <img src="logo.png" class="logo" alt="الشعار">
        <div class="title">معايدة أفساك السنوية</div>
        <input type="text" id="nameInput" placeholder="اكتب الاسم هنا" maxlength="40">
        <div class="buttons">
            <button class="show-btn" onclick="showGreeting()">عرض المعايدة</button>
            <button class="whatsapp-btn" onclick="shareWhatsApp()">واتساب</button>
        </div>
    </section>

    <section class="second-page" id="secondPage">
        <img src="Card.jpg" alt="بطاقة التهنئة">
        <div class="name-box" id="userName"></div>
    </section>

    <script>
        function showGreeting() {
            let enteredName = document.getElementById("nameInput").value.trim();

            if (enteredName === "") {
                alert("الرجاء كتابة الاسم أولاً لعرض المعايدة.");
                return;
            }

            document.getElementById("userName").innerText = enteredName;
            document.getElementById("firstPage").style.display = "none";
            document.getElementById("secondPage").style.display = "block";
            
            window.scrollTo(0, 0);
        }

        function shareWhatsApp() {
            let enteredName = document.getElementById("nameInput").value.trim();

            if (enteredName === "") {
                alert("الرجاء كتابة الاسم أولاً للمشاركة عبر واتساب.");
                return;
            }

            let currentUrl = window.location.href; 
            let message = `🌙 *كل عام وأنتم بخير*\n\nتفضل بقبول تهنئة عيد الأضحى المبارك مقدمة من:\n*${enteredName}*\n\nلرؤية المعايدة الخاصة بك افتح الرابط التالي:\n${currentUrl}`;
            let link = "https://wa.me/?text=" + encodeURIComponent(message);
            window.open(link, '_blank');
        }
    </script>

</body>
</html>
