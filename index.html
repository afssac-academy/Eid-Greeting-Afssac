<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معايدة أفساك السنوية</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        /* الصفحة الأولى (صندوق إدخال البيانات) */
        .first-page {
            width: 100%;
            max-width: 420px;
            background: #fff;
            padding: 35px 25px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            display: block;
        }

        /* اللوجو */
        .logo {
            width: 110px;
            margin-bottom: 20px;
        }

        /* العنوان الجديد */
        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #0b1a30;
        }

        /* حقل الإدخال */
        input {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #dcdcdc;
            font-size: 18px;
            outline: none;
            margin-bottom: 25px;
            text-align: center;
            color: #333;
            background: #fdfdfd;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #0d5c3f;
        }

        /* الأزرار */
        .buttons {
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .show-btn {
            background: #0d5c3f;
            color: #fff;
        }

        .whatsapp-btn {
            background: #25D366;
            color: #fff;
        }

        /* الصفحة الثانية (الكارت) - محسنة بالكامل للموبايل وطول الشاشة */
        .second-page {
            display: none; 
            width: 100%;
            max-width: 480px; /* متناسق تماماً مع أبعاد الهواتف الذكية */
            position: relative;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .second-page img {
            width: 100%;
            max-height: 88vh; /* يجعل الكارت يأخذ مساحة طولية ممتازة من شاشة الجوال */
            object-fit: contain;
            display: block;
        }

        /* تنسيق وموقع الاسم الجديد ليكون بالأسفل في الفراغ النظيف */
        .name-box {
            position: absolute;
            bottom: 14.5%; /* نزول الاسم ليتناسب تماماً فوق كلمة 1447 هـ دون التداخل مع تصميم الكعبة */
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 28px; /* تكبير حجم الخط ليكون واضحاً ومهيباً */
            font-weight: 700;
            color: #111; /* لون داكن صريح يتطابق مع نصوص الكارت المطبوعة */
            padding: 0 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>

<body>

    <section class="first-page" id="firstPage">
        <img src="logo.png" class="logo" alt="الشعار">

        <div class="title">
            معايدة أفساك السنوية
        </div>

        <input type="text" id="nameInput" placeholder="اكتب الاسم هنا" maxlength="40">

        <div class="buttons">
            <button class="show-btn" onclick="showGreeting()">عرض المعايدة</button>
            <button class="whatsapp-btn" onclick="shareWhatsApp()">واتساب</button>
        </div>
    </section>

    <section class="second-page" id="secondPage">
        <img src="Card.jpg" alt="بطاقة التهنئة">
        <div class="name-box" id="userName"></div>
    </section>

    <script>
        function showGreeting() {
            let enteredName = document.getElementById("nameInput").value.trim();

            if (enteredName === "") {
                alert("الرجاء كتابة الاسم أولاً لعرض المعايدة.");
                return;
            }

            // طباعة الاسم داخل الكارت
            document.getElementById("userName").innerText = enteredName;

            // إخفاء صفحة الإدخال وإظهار الكارت بحجمه الجديد
            document.getElementById("firstPage").style.display = "none";
            document.getElementById("secondPage").style.display = "block";
        }

        function shareWhatsApp() {
            let enteredName = document.getElementById("nameInput").value.trim();

            if (enteredName === "") {
                alert("الرجاء كتابة الاسم أولاً للمشاركة عبر واتساب.");
                return;
            }

            let currentUrl = window.location.href; 

            let message = `🌙 *كل عام وأنتم بخير*\n\nتفضل بقبول تهنئة عيد الأضحى المبارك مقدمة من:\n*${enteredName}*\n\nلرؤية المعايدة الخاصة بك افتح الرابط التالي:\n${currentUrl}`;

            let link = "https://wa.me/?text=" + encodeURIComponent(message);
            
            window.open(link, '_blank');
        }
    </script>

</body>
</html>
