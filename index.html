<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كارت تهنئة أكاديمية العرب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        .logo { width: 100px; margin-bottom: 20px; }
        h2 { color: #1a5e3a; font-size: 20px; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 18px; text-align: center; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        .btn { background: #1a5e3a; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 18px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        #step2 { display: none; }
        canvas { width: 100%; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); background: #eee; }
        .download-btn { background: #d1202f; margin-top: 15px; }
    </style>
</head>
<body>

<div class="box" id="step1">
    <img src="logo.png" class="logo">
    <h2>تهنئة عيد الفطر المبارك</h2>
    <input type="text" id="nameInput" placeholder="اكتب اسمك هنا">
    <button class="btn" onclick="generateCard()">إنشاء البطاقة</button>
</div>

<div class="box" id="step2">
    <canvas id="cardCanvas"></canvas>
    <button class="btn download-btn" onclick="downloadImage()">تحميل الصورة</button>
    <button class="btn" style="background:#666; margin-top:10px;" onclick="location.reload()">تعديل الاسم</button>
</div>

<script>
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');
    const cardImg = new Image();
    
    // تأكد أن اسم الصورة في GitHub هو Card.jpg (C كبيرة)
    cardImg.src = 'Card.jpg';

    function generateCard() {
        const name = document.getElementById('nameInput').value;
        if (!name) return alert("من فضلك اكتب الاسم");

        // مقاسات الصورة الأصلية
        canvas.width = 1080;
        canvas.height = 1920;

        // رسم الصورة
        if (cardImg.complete) {
            ctx.drawImage(cardImg, 0, 0, canvas.width, canvas.height);
            drawText(name);
        } else {
            cardImg.onload = function() {
                ctx.drawImage(cardImg, 0, 0, canvas.width, canvas.height);
                drawText(name);
            };
        }

        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
    }

    function drawText(name) {
        // الإعدادات المطلوبة: أسود، عريض، مسافة تحت الجملة
        ctx.fillStyle = "#000000"; 
        ctx.textAlign = "center";
        ctx.font = "800 85px 'Tajawal', sans-serif";
        
        // إحداثيات الاسم (73% من الارتفاع تجعله تحت جملة "كل عام وأنتم بخير")
        ctx.fillText(name, canvas.width / 2, canvas.height * 0.73);
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'Eid_Card_AFSSAC.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>

</body>
</html>
