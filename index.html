<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>معايدة عيد الأضحى - AFSSAC</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Tahoma, Arial;
    background:#f3f3f3;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:500px;
    padding:20px;
}

.card{
    background:#fff;
    border-radius:30px;
    padding:40px 30px;
    text-align:center;
    box-shadow:0 5px 25px rgba(0,0,0,0.1);
}

.logo{
    width:120px;
    margin-bottom:30px;
}

.title{
    color:#c39200;
    font-size:60px;
    font-weight:bold;
    line-height:1.3;
    margin-bottom:30px;
}

.text{
    font-size:28px;
    line-height:1.8;
    color:#111;
}

.name{
    font-size:70px;
    font-weight:bold;
    color:#000;
    margin:40px 0;
    line-height:1.2;
}

.footer{
    font-size:28px;
    margin-top:20px;
}

.inputBox{
    width:100%;
    height:70px;
    border-radius:18px;
    border:1px solid #ccc;
    text-align:center;
    font-size:28px;
    margin-top:30px;
}

.btn{
    width:100%;
    height:70px;
    border:none;
    border-radius:18px;
    background:#c39200;
    color:#fff;
    font-size:28px;
    font-weight:bold;
    margin-top:25px;
    cursor:pointer;
}

.share{
    background:#2ecc71;
}

.small{
    margin-top:40px;
    font-size:18px;
    color:#666;
}

.hidden{
    display:none;
}

@media(max-width:600px){

.title{
    font-size:38px;
}

.text{
    font-size:20px;
}

.name{
    font-size:42px;
}

.footer{
    font-size:20px;
}

.inputBox,
.btn{
    font-size:22px;
}

}

</style>
</head>

<body>

<div class="container">

    <!-- صفحة الإدخال -->

    <div class="card" id="startPage">

        <img src="logo.png" class="logo">

        <div class="title">
            عيد أضحى مبارك
        </div>

        <div class="text">
            أكاديمية العرب للإطفاء والسلامة والأمن<br>
            تهنئكم بحلول عيد الأضحى المبارك
        </div>

        <input
            type="text"
            id="userName"
            class="inputBox"
            placeholder="اكتب الاسم الكامل"
        >

        <button class="btn" onclick="showGreeting()">
            إنشاء المعايدة
        </button>

    </div>



    <!-- صفحة المعايدة -->

    <div class="card hidden" id="greetingPage">

        <img src="logo.png" class="logo">

        <div class="title">
            عيد أضحى مبارك
        </div>

        <div class="text">
            تتقدم أكاديمية العرب للإطفاء والسلامة والأمن<br>
            بأصدق التهاني والتبريكات<br>
            بمناسبة عيد الأضحى المبارك
        </div>

        <div class="name" id="finalName">
            أحمد عبد الستار
        </div>

        <div class="footer">
            كل عام وأنتم بخير
        </div>

        <button class="btn share" onclick="shareCard()">
            مشاركة المعايدة
        </button>

        <div class="small">
            AFSSAC Academy
        </div>

    </div>

</div>

<script>

function showGreeting(){

    let name = document.getElementById("userName").value;

    if(name.trim() == ""){
        alert("اكتب الاسم");
        return;
    }

    document.getElementById("finalName").innerHTML = name;

    document.getElementById("startPage").classList.add("hidden");

    document.getElementById("greetingPage").classList.remove("hidden");
}

function shareCard(){

    if(navigator.share){

        navigator.share({
            title:'معايدة عيد الأضحى',
            text:'كل عام وأنتم بخير'
        });

    }else{
        alert("المشاركة غير مدعومة على هذا الجهاز");
    }
}

</script>

</body>
</html>
