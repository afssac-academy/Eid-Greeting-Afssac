<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AFSSAC Eid Greeting</title>

<style>

body{
    margin:0;
    padding:0;
    background:#f3f3f3;
    font-family:Tahoma;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:520px;
    padding:20px;
}

.card{
    background:white;
    border-radius:30px;
    padding:40px 25px;
    text-align:center;
    box-shadow:0 5px 25px rgba(0,0,0,0.12);
}

.logo{
    width:120px;
    margin-bottom:25px;
}

.title{
    font-size:60px;
    font-weight:bold;
    color:#c39200;
    line-height:1.3;
    margin-bottom:25px;
}

.text{
    font-size:28px;
    line-height:1.8;
    color:#111;
}

.name{
    font-size:65px;
    font-weight:bold;
    color:black;
    margin:45px 0;
    line-height:1.2;
}

.footer{
    font-size:28px;
    margin-top:10px;
}

.input{
    width:100%;
    height:70px;
    border-radius:18px;
    border:1px solid #ccc;
    margin-top:35px;
    text-align:center;
    font-size:26px;
}

.btn{
    width:100%;
    height:70px;
    border:none;
    border-radius:18px;
    background:#c39200;
    color:white;
    font-size:28px;
    font-weight:bold;
    margin-top:20px;
    cursor:pointer;
}

.share{
    background:#2ecc71;
}

.small{
    margin-top:35px;
    font-size:18px;
    color:#666;
}

.hidden{
    display:none;
}

@media(max-width:600px){

.title{
    font-size:38px;
}

.text{
    font-size:20px;
}

.name{
    font-size:42px;
}

.footer{
    font-size:20px;
}

.input,
.btn{
    font-size:22px;
}

}

</style>
</head>

<body>

<div class="container">

<!-- الصفحة الأولى -->

<div class="card" id="page1">

<img src="logo.png" class="logo">

<div class="title">
عيد أضحى مبارك
</div>

<div class="text">
أكاديمية العرب للإطفاء والسلامة والأمن<br>
تهنئكم بحلول عيد الأضحى المبارك
</div>

<input
type="text"
id="username"
class="input"
placeholder="اكتب الاسم الكامل"
>

<button class="btn" onclick="openGreeting()">
إنشاء المعايدة
</button>

</div>

<!-- صفحة المعايدة -->

<div class="card hidden" id="page2">

<img src="logo.png" class="logo">

<div class="title">
عيد أضحى مبارك
</div>

<div class="text">
تتقدم أكاديمية العرب للإطفاء والسلامة والأمن<br>
بأصدق التهاني والتبريكات<br>
بمناسبة عيد الأضحى المبارك
</div>

<div class="name" id="personName">
أحمد عبد الستار
</div>

<div class="footer">
كل عام وأنتم بخير
</div>

<button class="btn share" onclick="shareGreeting()">
مشاركة المعايدة
</button>

<div class="small">
AFSSAC Academy
</div>

</div>

</div>

<script>

function openGreeting(){

let name = document.getElementById("username").value;

if(name.trim() == ""){
alert("اكتب الاسم");
return;
}

document.getElementById("personName").innerHTML = name;

document.getElementById("page1").classList.add("hidden");

document.getElementById("page2").classList.remove("hidden");

}

function shareGreeting(){

if(navigator.share){

navigator.share({
title:"معايدة عيد الأضحى",
text:"كل عام وأنتم بخير"
});

}else{

alert("المشاركة غير مدعومة");

}

}

</script>

</body>
</html>
