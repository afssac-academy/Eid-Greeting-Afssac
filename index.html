<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معايدة عيد الأضحى - AFSSAC</title>

<style>
body{
    margin:0;
    font-family:Tahoma, Arial;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:420px;
    padding:20px;
}

.card{
    background:white;
    border-radius:25px;
    padding:30px 25px;
    box-shadow:0 5px 25px rgba(0,0,0,0.15);
    text-align:center;
}

.logo{
    width:110px;
    margin-bottom:15px;
}

h1{
    color:#b88a00;
    margin-bottom:20px;
}

p{
    font-size:24px;
    line-height:1.8;
    color:#333;
}

.name{
    font-size:38px;
    font-weight:bold;
    color:#111;
    margin:25px 0;
}

input{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:20px;
    margin-top:20px;
    box-sizing:border-box;
    text-align:center;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    font-size:20px;
    cursor:pointer;
    font-weight:bold;
}

.create{
    background:#b88a00;
    color:white;
}

.share{
    background:#2ecc71;
    color:white;
}

.footer{
    margin-top:25px;
    color:#666;
}

#cardPage{
    display:none;
}
</style>
</head>

<body>

<div class="container">

    <!-- الصفحة الأولى -->
    <div class="card" id="homePage">

        <img src="logo.png" class="logo">

        <h1>عيد أضحى مبارك</h1>

        <p>
            أكاديمية العرب للإطفاء والسلامة والأمن<br>
            تهنئكم بحلول عيد الأضحى المبارك
        </p>

        <input type="text" id="userName" placeholder="اكتب الاسم الكامل">

        <button class="create" onclick="createCard()">
            إنشاء المعايدة
        </button>

    </div>

    <!-- صفحة المعايدة -->
    <div class="card" id="cardPage">

        <img src="logo.png" class="logo">

        <h1>عيد أضحى مبارك</h1>

        <p>
            تتقدم أكاديمية العرب للإطفاء والسلامة والأمن<br>
            بأصدق التهاني والتبريكات<br>
            بمناسبة عيد الأضحى المبارك
        </p>

        <div class="name" id="displayName"></div>

        <p>
            كل عام وأنتم بخير
        </p>

        <button class="share" onclick="shareCard()">
            مشاركة المعايدة
        </button>

        <div class="footer">
            AFSSAC Academy
        </div>

    </div>

</div>

<script>

function createCard(){

    let name = document.getElementById("userName").value;

    if(name.trim() === ""){
        alert("من فضلك اكتب الاسم");
        return;
    }

    let url = window.location.pathname + "?name=" + encodeURIComponent(name);

    window.location.href = url;
}

function shareCard(){

    navigator.clipboard.writeText(window.location.href);

    alert("تم نسخ رابط المعايدة");
}

const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if(name){

    document.getElementById("homePage").style.display = "none";
    document.getElementById("cardPage").style.display = "block";

    document.getElementById("displayName").innerText = name;
}

</script>

</body>
</html>
