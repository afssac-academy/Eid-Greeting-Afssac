<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>معايدة عيد الأضحى</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
}

/* الإدخال */

.input-box{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:18px;
    outline:none;
    margin-bottom:10px;
}

/* الأزرار */

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    margin-bottom:10px;
}

.show-btn{
    background:#0d5c3f;
    color:#fff;
}

.whatsapp-btn{
    background:#25D366;
    color:#fff;
}

/* الكارت */

.card{
    position:relative;
    width:100%;
    border-radius:25px;
    overflow:hidden;
}

.card img{
    width:100%;
    display:block;
}

/* الاسم */

.name-box{
    position:absolute;
    bottom:95px;
    width:100%;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#c89b2d;
}

/* التاريخ */

.year{
    position:absolute;
    bottom:55px;
    width:100%;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    color:#000;
}

</style>

</head>

<body>

<div class="container">

<!-- الإدخال -->

<div class="input-box">

<input type="text"
id="nameInput"
placeholder="اكتب الاسم هنا">

<button class="show-btn"
onclick="showGreeting()">
عرض المعايدة
</button>

<a id="whatsappBtn"
target="_blank">

<button class="whatsapp-btn"
onclick="shareWhatsApp()">
مشاركة عبر واتساب
</button>

</a>

</div>

<!-- الكارت -->

<div class="card">

<!-- صورة المعايدة -->
<img src="Card.jpg">

<!-- الاسم -->
<div class="name-box"
id="userName">
</div>

<!-- التاريخ -->
<div class="year">
1447 هـ
</div>

</div>

</div>

<script>

function showGreeting(){

    let enteredName =
    document.getElementById("nameInput").value;

    document.getElementById("userName")
    .innerText = enteredName;

}

function shareWhatsApp(){

    let enteredName =
    document.getElementById("nameInput").value;

    let message =
`🌙 كل عام وأنتم بخير

معايدة عيد الأضحى من:
${enteredName}`;

    let whatsappLink =
    "https://wa.me/?text=" +
    encodeURIComponent(message);

    document.getElementById("whatsappBtn")
    .href = whatsappLink;

}

</script>

</body>

</html>
