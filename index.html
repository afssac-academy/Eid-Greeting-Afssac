<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معايدة عيد الأضحى</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Tahoma;
    background:#f7f3ee;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:700px;
    padding:20px;
}

.main-card{
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
}

.top-image{
    width:100%;
    display:block;
}

.content{
    padding:25px;
    text-align:center;
}

input{
    width:100%;
    padding:18px;
    border-radius:15px;
    border:2px solid #d4a54c;
    font-size:22px;
    margin-top:20px;
    box-sizing:border-box;
    text-align:center;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    background:#1f5f3b;
    color:white;
    font-size:28px;
    margin-top:20px;
    cursor:pointer;
    font-weight:bold;
}

.result{
    margin-top:30px;
    display:none;
}

.card-preview{
    position:relative;
}

.card-preview img{
    width:100%;
    border-radius:20px;
}

.name{
    position:absolute;
    top:47%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:38px;
    color:#b8860b;
    font-weight:bold;
    width:80%;
}

</style>
</head>

<body>

<div class="container">

<div class="main-card">

<img src="Card.jpg" class="top-image">

<div class="content">

<input type="text" id="username" placeholder="اكتب الاسم كاملا هنا">

<button onclick="showCard()">عرض المعايدة</button>

<div class="result" id="result">

<div class="card-preview">

<img src="Card.jpg">

<div class="name" id="cardName">
الاسم الكامل
</div>

</div>

</div>

</div>

</div>

</div>

<script>

function showCard(){

let name=document.getElementById("username").value;

if(name.trim()==""){
alert("اكتب الاسم");
return;
}

document.getElementById("cardName").innerHTML=name;

document.getElementById("result").style.display="block";

window.scrollTo({
top:document.body.scrollHeight,
behavior:'smooth'
});

}

</script>

</body>
</html>
