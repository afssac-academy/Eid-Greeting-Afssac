<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معايدة عيد الأضحى</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
background:#f7f3ee;
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:700px;
}

/* صفحة البداية */

.start-page{
background:white;
padding:40px 25px;
border-radius:25px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
text-align:center;
}

.logo{
width:120px;
margin-bottom:20px;
}

.title{
font-size:38px;
color:#1f5f3b;
margin-bottom:15px;
font-weight:bold;
}

.desc{
color:#777;
font-size:20px;
margin-bottom:25px;
line-height:1.8;
}

input{
width:100%;
padding:18px;
border-radius:15px;
border:2px solid #d4a54c;
font-size:22px;
text-align:center;
outline:none;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#1f5f3b;
color:white;
font-size:28px;
margin-top:20px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#17482d;
}

/* الكارت */

.result{
display:none;
}

.card-preview{
position:relative;
}

.card-preview img{
width:100%;
border-radius:25px;
display:block;
}

/* الاسم داخل التصميم */

.name{
position:absolute;
top:51%;
left:50%;
transform:translate(-50%,-50%);
font-size:42px;
color:#c6922d;
font-weight:bold;
width:85%;
text-align:center;
text-shadow:1px 1px 3px rgba(0,0,0,0.2);
}

/* موبايل */

@media(max-width:600px){

.title{
font-size:30px;
}

.desc{
font-size:18px;
}

button{
font-size:24px;
}

.name{
font-size:34px;
top:50%;
}

}

</style>
</head>

<body>

<div class="container">

<!-- صفحة البداية -->

<div class="start-page" id="startPage">

<img src="logo.png" class="logo">

<div class="title">
معايدة عيد الأضحى
</div>

<div class="desc">
اكتب اسمك وسيتم إنشاء معايدة خاصة بك بشكل احترافي
</div>

<input type="text" id="username" placeholder="اكتب الاسم بالكامل">

<button onclick="showCard()">
عرض المعايدة
</button>

</div>

<!-- الكارت النهائي -->

<div class="result" id="result">

<div class="card-preview">

<img src="Card.jpg">

<div class="name" id="cardName">
الاسم الكامل
</div>

</div>

</div>

</div>

<script>

function showCard(){

let name = document.getElementById("username").value;

if(name.trim() == ""){
alert("من فضلك اكتب الاسم");
return;
}

/* وضع الاسم */

document.getElementById("cardName").innerHTML = name;

/* إخفاء البداية */

document.getElementById("startPage").style.display = "none";

/* إظهار الكارت */

document.getElementById("result").style.display = "block";

/* بداية الصفحة */

window.scrollTo({
top:0,
behavior:'smooth'
});

}

</script>

</body>
</html>
