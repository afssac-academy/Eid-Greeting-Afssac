<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد الأضحى</title>

<style>

body{
margin:0;
padding:0;
background:#f2f2f2;
font-family:Tahoma;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:#fff;
width:90%;
max-width:500px;
padding:40px 25px;
border-radius:30px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.1);
}

.logo{
width:120px;
margin-bottom:30px;
}

.title{
font-size:58px;
font-weight:bold;
color:#c39200;
line-height:1.4;
margin-bottom:25px;
}

.text{
font-size:28px;
line-height:1.8;
color:#111;
}

.name{
font-size:65px;
font-weight:bold;
margin:40px 0;
line-height:1.3;
}

.input{
width:100%;
height:70px;
border-radius:18px;
border:1px solid #ccc;
font-size:26px;
text-align:center;
margin-top:30px;
}

.btn{
width:100%;
height:70px;
border:none;
border-radius:18px;
background:#c39200;
color:#fff;
font-size:28px;
font-weight:bold;
margin-top:20px;
cursor:pointer;
}

.hidden{
display:none;
}

.footer{
font-size:28px;
margin-top:20px;
}

.share{
background:#2ecc71;
}

.small{
margin-top:35px;
font-size:18px;
color:#666;
}

@media(max-width:600px){

.title{
font-size:42px;
}

.text{
font-size:20px;
}

.name{
font-size:42px;
}

.footer{
font-size:20px;
}

}

</style>
</head>

<body>

<!-- الصفحة الأولى -->

<div class="card" id="start">

<img src="logo.png" class="logo">

<div class="title">
عيد أضحى مبارك
</div>

<div class="text">
أكاديمية العرب للإطفاء والسلامة والأمن<br>
تهنئكم بحلول عيد الأضحى المبارك
</div>

<input
type="text"
id="username"
class="input"
placeholder="اكتب الاسم الكامل"
>

<button class="btn" onclick="createCard()">
إنشاء المعايدة
</button>

</div>

<!-- صفحة المعايدة -->

<div class="card hidden" id="greeting">

<img src="logo.png" class="logo">

<div class="title">
عيد أضحى مبارك
</div>

<div class="text">
تتقدم أكاديمية العرب للإطفاء والسلامة والأمن<br>
بأصدق التهاني والتبريكات<br>
بمناسبة عيد الأضحى المبارك
</div>

<div class="name" id="finalName"></div>

<div class="footer">
كل عام وأنتم بخير
</div>

<button class="btn share">
مشاركة المعايدة
</button>

<div class="small">
AFSSAC Academy
</div>

</div>

<script>

function createCard(){

let name = document.getElementById("username").value;

if(name.trim() == ""){
alert("اكتب الاسم");
return;
}

document.getElementById("finalName").innerHTML = name;

document.getElementById("start").classList.add("hidden");

document.getElementById("greeting").classList.remove("hidden");

}

</script>

</body>
</html>
