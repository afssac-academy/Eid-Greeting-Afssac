<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معايدة أفساك السنوية</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            overflow: hidden; /* يمنع الاسكرول تماماً وقت حركة الستارة */
        }

        /* ----- تأثير الستارة الحقيقية (تنفتح لليمين واليسار) ----- */
        .curtain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            display: flex;
            pointer-events: none; /* عشان ما تعطلش الضغط بعد ما تفتح */
        }

        .curtain-half {
            width: 50%;
            height: 100%;
            background: #0d5c3f; /* لون هوية أفساك الأخضر */
            transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            pointer-events: auto;
        }

        .left-curtain {
            transform: translateX(0);
        }

        .right-curtain {
            transform: translateX(0);
        }

        /* حركات فتح الستارة للجانبين */
        .curtain-container.open .left-curtain {
            transform: translateX(100%); /* تتحرك لليسار في نظام الـ RTL */
        }

        .curtain-container.open .right-curtain {
            transform: translateX(-100%); /* تتحرك لليمين في نظام الـ RTL */
        }

        /* الشعار في المنتصف فوق الستارتين */
        .curtain-logo-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            text-align: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            pointer-events: auto;
        }

        .curtain-logo {
            width: 140px;
            margin-bottom: 15px;
        }

        .curtain-text {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
        }

        .curtain-container.open .curtain-logo-box {
            opacity: 0;
            visibility: hidden;
        }

        /* ----- الصفحة الأولى ----- */
        .first-page {
            width: 90%;
            max-width: 420px;
            background: #fff;
            padding: 35px 25px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            display: block;
            z-index: 1;
        }

        .logo {
            width: 110px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #0b1a30;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #dcdcdc;
            font-size: 18px;
            outline: none;
            margin-bottom: 25px;
            text-align: center;
            color: #333;
        }

        .show-btn {
            background: #0d5c3f;
            color: #fff;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
        }

        /* ----- الصفحة الثانية ----- */
        .second-page {
            display: none; 
            width: 100vw;
            max-width: 500px;
            text-align: center;
            padding: 10px;
        }

        .card-container {
            width: 100%;
            position: relative;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .card-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* مكان الاسم الموزون بالملي وفوق الـ 1447 هـ */
        .name-box {
            position: absolute;
            bottom: 9.5%; 
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            color: #000;
            padding: 0 15px;
            direction: rtl;
        }

        .save-btn {
            background: #107c41;
            color: #fff;
            margin-top: 15px;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(16, 124, 65, 0.3);
        }
    </style>
</head>

<body>

    <div class="curtain-container" id="curtainContainer">
        <div class="curtain-logo-box">
            <img src="logo.png" class="curtain-logo" alt="أفساك">
            <div class="curtain-text">معايدة أفساك السنوية</div>
        </div>
        <div class="curtain-half left-curtain"></div>
        <div class="curtain-half right-curtain"></div>
    </div>

    <section class="first-page" id="firstPage">
        <img src="logo.png" class="logo" alt="الشعار">
        <div class="title">معايدة أفساك السنوية</div>
        <input type="text" id="nameInput" placeholder="اكتب الاسم هنا" maxlength="40">
        <button class="show-btn" onclick="showGreeting()">عرض المعايدة</button>
    </section>

    <section class="second-page" id="secondPage">
        <div class="card-container" id="cardCapture">
            <img src="Card.jpg" alt="بطاقة التهنئة">
            <div class="name-box" id="userName"></div>
        </div>
        <button class="save-btn" onclick="downloadCard()">حفظ المعايدة كصورة 💾</button>
    </section>

    <script>
        // دالة تشغيل حركة فتح الستارة للجانبين تلقائياً بعد ثانية ونصف
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const curtainContainer = document.getElementById('curtainContainer');
                curtainContainer.classList.add('open');
                
                // تفعيل الاسكرول بعد اختفاء الستارة تماماً من الشاشة
                setTimeout(() => {
                    document.body.style.overflow = 'auto';
                }, 1500);
            }, 1500); // تظل ثابتة لمدة ثانية ونصف كافتتاحية فخمة ثم تفتح
        });

        function showGreeting() {
            let enteredName = document.getElementById("nameInput").value.trim();

            if (enteredName === "") {
                alert("الرجاء كتابة الاسم أولاً لعرض المعايدة.");
                return;
            }

            document.getElementById("userName").innerText = enteredName;
            document.getElementById("firstPage").style.display = "none";
            document.getElementById("secondPage").style.display = "block";
            
            window.scrollTo(0, 0);
        }

        // دالة تحويل الكارت لصورة وحفظها
        function downloadCard() {
            let enteredName = document.getElementById("nameInput").value.trim();
            const cardElement = document.getElementById('cardCapture');
            const saveBtn = document.querySelector('.save-btn');
            
            saveBtn.innerText = "جاري التحضير والحفظ...";
            saveBtn.style.opacity = "0.7";

            html2canvas(cardElement, {
                useCORS: true,
                scale: 3, 
                allowTaint: true
            }).then(canvas => {
                const image = canvas.toDataURL('image/jpeg', 1.0);
                const link = document.createElement('a');
                link.download = `معايدة_أفساك_${enteredName}.jpg`;
                link.href = image;
                link.click();

                saveBtn.innerText = "حفظ المعايدة كصورة 💾";
                saveBtn.style.opacity = "1";
            }).catch(err => {
                alert("عذراً، حدث خطأ أثناء الحفظ، يرجى المحاولة مجدداً.");
                saveBtn.innerText = "حفظ المعايدة كصورة 💾";
                saveBtn.style.opacity = "1";
            });
        }
    </script>

</body>
</html>
