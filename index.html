<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>معايدة عيد الأضحى - AFSSAC</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Tahoma, Arial;
    background:#f3f3f3;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:500px;
    padding:20px;
}

.card{
    background:#fff;
    border-radius:30px;
    padding:40px 30px;
    text-align:center;
    box-shadow:0 8px 30px rgba(0,0,0,0.12);
}

.logo{
    width:110px;
    margin-bottom:25px;
}

h1{
    color:#b88900;
    font-size:55px;
    margin-bottom:30px;
}

p{
    color:#222;
    font-size:22px;
    line-height:2;
    margin:0;
}

.name{
    font-size:60px;
    font-weight:bold;
    color:#000;
    margin:40px 0;
}

input{
    width:100%;
    padding:18px;
    border-radius:15px;
    border:1px solid #ccc;
    font-size:22px;
    box-sizing:border-box;
    text-align:center;
    margin-top:30px;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.create-btn{
    background:#b88900;
    color:white;
}

.share-btn{
    background:#2ecc71;
    color:white;
}

.footer{
    margin-top:35px;
    color:#666;
    font-size:18px;
}

#cardPage{
    display:none;
}

</style>
</head>

<body>

<div class="container">

    <!-- الصفحة الأولى -->
    <div class="card" id="homePage">

        <img src="logo.png" class="logo">

        <h1>عيد أضحى مبارك</h1>

        <p>
            أكاديمية العرب للإطفاء والسلامة والأمن<br>
            تهنئكم بحلول عيد الأضحى المبارك
        </p>

        <input type="text" id="userName" placeholder="اكتب الاسم الكامل">

        <button class="create-btn" onclick="createCard()">
            إنشاء المعايدة
        </button>

    </div>

    <!-- صفحة المعايدة -->
    <div class="card" id="cardPage">

        <img src="logo.png" class="logo">

        <h1>عيد أضحى مبارك</h1>

        <p>
            تتقدم أكاديمية العرب للإطفاء<br>
            والسلامة والأمن<br>
            بأصدق التهاني والتبريكات<br>
            بمناسبة عيد الأضحى المبارك
        </p>

        <div class="name" id="displayName"></div>

        <p>
            كل عام وأنتم بخير
        </p>

        <button class="share-btn" onclick="shareCard()">
            مشاركة المعايدة
        </button>

        <div class="footer">
            AFSSAC Academy
        </div>

    </div>

</div>

<script>

function createCard(){

    let name = document.getElementById("userName").value;

    if(name.trim() === ""){
        alert("من فضلك اكتب الاسم");
        return;
    }

    let url = window.location.pathname + "?name=" + encodeURIComponent(name);

    window.location.href = url;
}

function shareCard(){

    navigator.clipboard.writeText(window.location.href);

    alert("تم نسخ رابط المعايدة");
}

const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if(name){

    document.getElementById("homePage").style.display = "none";
    document.getElementById("cardPage").style.display = "block";

    document.getElementById("displayName").innerText = name;
}

</script>

</body>
</html>
