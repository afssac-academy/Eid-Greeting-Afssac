<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معايدة عيد الأضحى - أفساك</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Tahoma, Arial;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:420px;
    padding:20px;
}

.card{
    position:relative;
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 5px 25px rgba(0,0,0,0.15);
    text-align:center;
    padding:25px 20px;
}

.makkah{
    position:absolute;
    inset:0;
    background:url('https://upload.wikimedia.org/wikipedia/commons/9/99/Kaaba_Masjid_Al_Haram_Makkah.jpg') center/cover;
    opacity:0.08;
}

.content{
    position:relative;
    z-index:2;
}

.logo{
    width:110px;
    margin-bottom:15px;
}

h1{
    color:#b48a00;
    margin:10px 0;
    font-size:30px;
}

h2{
    color:#222;
    font-size:24px;
    margin:20px 0;
    line-height:1.8;
}

p{
    color:#555;
    font-size:18px;
    line-height:1.8;
}

input{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:2px solid #ddd;
    font-size:18px;
    margin-top:15px;
    box-sizing:border-box;
    text-align:center;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.generate{
    background:#b48a00;
    color:white;
}

.generate:hover{
    background:#967300;
}

.share{
    background:#25D366;
    color:white;
}

.footer{
    margin-top:25px;
    color:#777;
    font-size:15px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="makkah"></div>

<div class="content">

<img src="logo.png" class="logo">

<h1>عيد أضحى مبارك</h1>

<p>
تتقدم أكاديمية العرب للإطفاء والسلامة والأمن<br>
بأصدق التهاني والتبريكات<br>
بمناسبة عيد الأضحى المبارك
</p>

<h2 id="greetingName">
كل عام وأنتم بخير
</h2>

<input type="text" id="nameInput" placeholder="اكتب الاسم الكامل هنا">

<button class="generate" onclick="generateGreeting()">
إنشاء المعايدة
</button>

<button class="share" onclick="shareGreeting()">
مشاركة المعايدة
</button>

<div class="footer">
AFSSAC Academy
</div>

</div>
</div>
</div>

<script>

function generateGreeting(){

let name = document.getElementById("nameInput").value;

if(name.trim() === ""){
    alert("من فضلك اكتب الاسم");
    return;
}

document.getElementById("greetingName").innerHTML =
"الأستاذ / " + name + "<br>كل عام وأنتم بخير";

let url = window.location.origin + window.location.pathname + "?name=" + encodeURIComponent(name);

window.history.replaceState({},'',url);

}

function shareGreeting(){

navigator.clipboard.writeText(window.location.href);

alert("تم نسخ رابط المعايدة");
}

window.onload = function(){

const params = new URLSearchParams(window.location.search);

const name = params.get("name");

if(name){

document.getElementById("greetingName").innerHTML =
"الأستاذ / " + name + "<br>كل عام وأنتم بخير";

document.getElementById("nameInput").value = name;

}

}

</script>

</body>
</html>
