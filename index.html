<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>معايدة عيد الأضحى - أفساك</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    padding:0;
    font-family:'Cairo',sans-serif;
    background:#f8f6ef;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:95%;
    max-width:700px;
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    position:relative;
}

.hero{
    position:relative;
    padding:40px 20px;
    text-align:center;
    background:linear-gradient(to bottom,#ffffff,#f7f2df);
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:url('Card.jpg') center center no-repeat;
    background-size:cover;
    opacity:0.08;
}

.logo{
    width:120px;
    position:relative;
    z-index:2;
}

h1{
    position:relative;
    z-index:2;
    color:#8b6b00;
    margin-top:20px;
    font-size:34px;
}

.greeting{
    position:relative;
    z-index:2;
    color:#444;
    font-size:24px;
    margin-top:15px;
    line-height:2;
}

#displayName{
    color:#b8860b;
    font-weight:bold;
}

.input-box{
    padding:30px 20px;
    text-align:center;
}

input{
    width:85%;
    padding:15px;
    border-radius:15px;
    border:1px solid #ddd;
    font-size:18px;
    font-family:'Cairo',sans-serif;
    outline:none;
}

button{
    margin-top:15px;
    padding:14px 30px;
    border:none;
    border-radius:15px;
    background:#b8860b;
    color:white;
    font-size:18px;
    cursor:pointer;
    font-family:'Cairo',sans-serif;
    transition:0.3s;
}

button:hover{
    background:#9d7508;
}

.footer{
    text-align:center;
    padding:20px;
    color:#777;
    font-size:15px;
}

</style>
</head>

<body>

<div class="container">

    <div class="hero">

        <img src="logo.png" class="logo">

        <h1>عيد أضحى مبارك</h1>

        <div class="greeting">
            تتقدم أكاديمية أفساك للإطفاء والسلامة والأمن<br>
            بأطيب التهاني والتبريكات إلى<br><br>

            <span id="displayName">ضيفنا الكريم</span><br><br>

            بمناسبة عيد الأضحى المبارك 🌙
        </div>

    </div>

    <div class="input-box">

        <input type="text" id="visitorName" placeholder="اكتب الاسم الكامل هنا">

        <br>

        <button onclick="generateGreeting()">
            عرض المعايدة
        </button>

    </div>

    <div class="footer">
        AFSSAC Academy © 2026
    </div>

</div>

<script>

function generateGreeting(){

    const name = document.getElementById("visitorName").value.trim();

    if(name === ""){
        alert("يرجى كتابة الاسم الكامل");
        return;
    }

    document.getElementById("displayName").innerText = name;

    const newUrl = window.location.pathname + "?name=" + encodeURIComponent(name);

    window.history.replaceState({}, "", newUrl);
}

window.onload = function(){

    const params = new URLSearchParams(window.location.search);

    const name = params.get("name");

    if(name){

        document.getElementById("displayName").innerText = name;

        document.getElementById("visitorName").value = name;
    }
}

</script>

</body>
</html>
