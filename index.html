<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>معايدة عيد الأضحى</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tajawal,sans-serif;
}

body{
    background:#f5f5f5;
}

/* الصفحة الأولى */

.first-page{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.box{
    width:100%;
    max-width:450px;
    background:#fff;
    padding:30px 20px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

/* اللوجو */

.logo{
    width:120px;
    margin-bottom:20px;
}

/* العنوان */

.title{
    font-size:26px;
    font-weight:bold;
    margin-bottom:25px;
    color:#000;
}

/* الإدخال */

input{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:18px;
    outline:none;
    margin-bottom:20px;
}

/* الأزرار */

.buttons{
    display:flex;
    gap:10px;
}

button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:17px;
    cursor:pointer;
}

.show-btn{
    background:#0d5c3f;
    color:#fff;
}

.whatsapp-btn{
    background:#25D366;
    color:#fff;
}

/* الصفحة الثانية */

.second-page{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* كارت المعايدة */

.card{
    width:100%;
    max-width:500px;
    position:relative;
}

.card img{
    width:100%;
    display:block;
    border-radius:20px;
}

/* الاسم فوق التاريخ الموجود في الصورة */

.name-box{
    position:absolute;
    bottom:85px;
    width:100%;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#000;
}

</style>

</head>

<body>

<!-- الصفحة الأولى -->

<section class="first-page">

<div class="box">

<!-- اللوجو -->
<img src="logo.png" class="logo">

<!-- العنوان -->
<div class="title">
معايدة عيد الأضحى المبارك
</div>

<!-- إدخال الاسم -->
<input
type="text"
id="nameInput"
placeholder="اكتب الاسم هنا">

<!-- الأزرار -->
<div class="buttons">

<button
class="show-btn"
onclick="showGreeting()">
عرض المعايدة
</button>

<a
id="whatsappBtn"
target="_blank"
style="flex:1;">

<button
class="whatsapp-btn"
onclick="shareWhatsApp()"
style="width:100%;">
واتساب
</button>

</a>

</div>

</div>

</section>

<!-- الصفحة الثانية -->

<section class="second-page">

<div class="card">

<!-- صورة المعايدة -->
<img src="Card.jpg">

<!-- الاسم -->
<div
class="name-box"
id="userName">
</div>

</div>

</section>

<script>

function showGreeting(){

    let enteredName =
    document.getElementById("nameInput").value;

    document.getElementById("userName")
    .innerText = enteredName;

    
    /* النزول للصفحة الثانية */

    document.querySelector(".second-page")
    .scrollIntoView({
        behavior:"smooth"
    });

}

function shareWhatsApp(){

    let enteredName =
    document.getElementById("nameInput").value;

    let message =
`🌙 كل عام وأنتم بخير

معايدة عيد الأضحى من:
${enteredName}`;

    let link =
    "https://wa.me/?text=" +
    encodeURIComponent(message);

    document.getElementById("whatsappBtn")
    .href = link;

}

</script>

</body>

</html>
