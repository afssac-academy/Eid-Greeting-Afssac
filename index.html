<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معايدة أفساك السنوية</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            overflow: hidden; /* منع الاسكرول تماماً وقت حركة الستارة */
        }

        /* ----- الستارة الواقعية (تأثير القماش والكشكشة) ----- */
        .curtain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            display: flex;
            pointer-events: none;
        }

        .curtain-half {
            width: 50%;
            height: 100%;
            /* عمل تأثير ثنيات القماش الظلية باستخدام الـ Gradients */
            background: linear-gradient(90deg, 
                #083b28 0%, #0d5c3f 12%, #0a4731 25%, 
                #0d5c3f 38%, #083b28 50%, #0d5c3f 62%, 
                #0a4731 75%, #0d5c3f 88%, #083b28 100%);
            background-size: 20% 100%; /* تكرار الثنيات لتبدو كالقماش */
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            pointer-events: auto;
            /* تحديد نقطة الارتكاز على الأطراف عشان الكشكشة تسحب للجنب */
            transition: transform 1.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        /* الستارة اليسرى ترتكز على اليسار */
        .left-curtain {
            transform-origin: left center;
        }

        /* الستارة اليمنى ترتكز على اليمين */
        .right-curtain {
            transform-origin: right center;
        }

        /* تأثير السحب والكشكشة الحقيقي (تتقوس وتنكمش للطرف) */
        .curtain-container.open .left-curtain {
            transform: scaleX(0) skewY(-5deg);
            opacity: 0.9;
        }

        .curtain-container.open .right-curtain {
            transform: scaleX(0) skewY(5deg);
            opacity: 0.9;
        }

        /* الشعار والنص في المنتصف فوق الستارة */
        .curtain-logo-box {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            text-align: center;
            transition: opacity 0.6s ease, transform 0.8s ease;
            pointer-events: auto;
        }

        .curtain-logo {
            width: 130px;
            margin-bottom: 15px;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.3));
        }

        .curtain-text {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        /* اختفاء الشعار أول ما الستارة تبدأ تفتح */
        .curtain-container.open .curtain-logo-box {
            opacity: 0;
            transform: translate(-50%, -60%) scale(0.8);
        }

        /* ----- الصفحة الأولى (صندوق كتابة الاسم) ----- */
        .first-page {
            width: 90%;
            max-width: 420px;
            background: #fff;
            padding: 35px 25px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            display: block;
            z-index: 1;
        }

        .logo {
            width: 110px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #0b1a30;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #dcdcdc;
            font-size: 18px;
            outline: none;
            margin-bottom: 25px;
            text-align: center;
            color: #333;
        }

        .show-btn {
            background: #0d5c3f;
            color: #fff;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
        }

        /* ----- الصفحة الثانية (الكارت وزر الحفظ) ----- */
        .second-page {
            display: none; 
            width: 100vw;
            max-width: 500px;
            text-align: center;
            padding: 10px;
        }

        .card-container {
            width: 100%;
            position: relative;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .card-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* مكان الاسم الموزون بالملي في المساحة البيضاء فوق التاريخ */
        .name-box {
            position: absolute;
            bottom: 9.5%; 
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            color: #000;
            padding: 0 15px;
            direction: rtl;
        }

        .save-btn {
            background: #107c41;
            color: #fff;
            margin-top: 15px;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(16, 124, 65, 0.3);
        }
    </style>
</head>

<body>

    <div class="curtain-container" id="curtainContainer">
        <div class="curtain-logo-box">
            <img src="logo.png" class="curtain-logo" alt="أفساك">
            <div class="curtain-text">معايدة أفساك السنوية</div>
        </div>
        <div class="curtain-half left-curtain"></div>
        <div class="curtain-half right-curtain"></div>
    </div>

    <section class="first-page" id="firstPage">
        <img src="logo.png" class="logo" alt="الشعار">
        <div class="title">معايدة أفساك السنوية</div>
        <input type="text" id="nameInput" placeholder="اكتب الاسم هنا" maxlength="40">
        <button class="show-btn" onclick="showGreeting()">عرض المعايدة</button>
    </section>

    <section class="second-page" id="secondPage">
        <div class="card-container" id="cardCapture">
            <img src="Card.jpg" alt="بطاقة التهنئة">
            <div class="name-box" id="userName"></div>
        </div>
        <button class="save-btn" onclick="downloadCard()">حفظ المعايدة كصورة 💾</button>
    </section>

    <script>
        // تشغيل الحركة فور تحميل الموقع بتأثير الكشكشة والسحب
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const curtainContainer = document.getElementById('curtainContainer');
                curtainContainer.classList.add('open');
                
                // السماح بالتصفح الطبيعي بعد فتح الستارة بالكامل
                setTimeout(() => {
                    document.body.style.overflow = 'auto';
                }, 1800);
            }, 1200); // تظل الستارة ثابتة ثانية وجزء لتأمل الهوية ثم تنكمش
        });

        function showGreeting() {
            let enteredName = document.getElementById("nameInput").value.trim();

            if (enteredName === "") {
                alert("الرجاء كتابة الاسم أولاً لعرض المعايدة.");
                return;
            }

            document.getElementById("userName").innerText = enteredName;
            document.getElementById("firstPage").style.display = "none";
            document.getElementById("secondPage").style.display = "block";
            
            window.scrollTo(0, 0);
        }

        // دالة حفظ الكارت كصورة بجودة عالية
        function downloadCard() {
            let enteredName = document.getElementById("nameInput").value.trim();
            const cardElement = document.getElementById('cardCapture');
            const saveBtn = document.querySelector('.save-btn');
            
            saveBtn.innerText = "جاري التحضير والحفظ...";
            saveBtn.style.opacity = "0.7";

            html2canvas(cardElement, {
                useCORS: true,
                scale: 3, 
                allowTaint: true
            }).then(canvas => {
                const image = canvas.toDataURL('image/jpeg', 1.0);
                const link = document.createElement('a');
                link.download = `معايدة_أفساك_${enteredName}.jpg`;
                link.href = image;
                link.click();

                saveBtn.innerText = "حفظ المعايدة كصورة 💾";
                saveBtn.style.opacity = "1";
            }).catch(err => {
                alert("عذراً، حدث خطأ أثناء الحفظ، يرجى المحاولة مجدداً.");
                saveBtn.innerText = "حفظ المعايدة كصورة 💾";
                saveBtn.style.opacity = "1";
            });
        }
    </script>

</body>
</html>
