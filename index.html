<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>معايدة عيد الأضحى</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma;
}

body{
    background:#f3f3f3;
    display:flex;
    justify-content:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
}

/* الفورم */

.form-box{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:18px;
    margin-bottom:15px;
    outline:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    margin-bottom:10px;
    transition:0.3s;
}

/* زر المعايدة */

.show-btn{
    background:#0b5d3b;
    color:#fff;
}

.show-btn:hover{
    background:#08462d;
}

/* زر واتساب */

.whatsapp-btn{
    background:#25D366;
    color:#fff;
}

.whatsapp-btn:hover{
    background:#1da851;
}

/* الكارت */

.card{
    background:#f5f5f5;
    border-radius:25px;
    overflow:hidden;
    position:relative;
    text-align:center;
    padding:30px 20px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* اللوجو */

.logo{
    width:90px;
    margin-bottom:15px;
}

/* صورة الخط */

.eid-title{
    width:230px;
    margin:10px auto 20px;
    display:block;
}

/* النص */

.text{
    font-size:28px;
    font-weight:bold;
    line-height:1.8;
    color:#222;
}

/* الاسم */

.name-box{
    width:100%;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#c69214;
    margin-top:25px;
    margin-bottom:15px;
}

/* صورة الكعبة */

.kaaba{
    width:260px;
    margin-top:15px;
}

/* التاريخ */

.year{
    width:100%;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    margin-top:20px;
}

/* الطيور */

.birds{
    position:absolute;
    left:30px;
    top:320px;
    width:120px;
}

</style>

</head>

<body>

<div class="container">

<!-- إدخال الاسم -->

<div class="form-box">

<input type="text" id="nameInput" placeholder="اكتب الاسم هنا">

<button class="show-btn" onclick="showGreeting(); shareWhatsApp();">
عرض المعايدة
</button>

<a id="whatsappBtn" target="_blank">

<button class="whatsapp-btn">
مشاركة عبر واتساب
</button>

</a>

</div>

<!-- الكارت -->

<div class="card">

<!-- اللوجو -->
<img src="logo.png" class="logo">

<!-- عنوان العيد -->
<img src="Card.jpg" class="eid-title">

<!-- النص -->
<div class="text">
نهنئكم بقدوم عيد الأضحى المبارك <br>
تقبل الله منا ومنكم صالح الأعمال
</div>

<!-- الاسم -->
<div class="name-box" id="userName">
Afssac
</div>

<!-- صورة الكعبة -->
<img src="Card.jpg" class="kaaba">

<!-- التاريخ -->
<div class="year">
1447 هـ
</div>

</div>

</div>

<script>

function showGreeting(){

    let enteredName =
    document.getElementById("nameInput").value;

    if(enteredName.trim() !== ""){

        document.getElementById("userName").innerText =
        enteredName;

    }

}

function shareWhatsApp(){

    let enteredName =
    document.getElementById("nameInput").value;

    let message =
`🌙 كل عام وأنتم بخير

معايدة عيد الأضحى من:
${enteredName}`;

    let whatsappLink =
    "https://wa.me/?text=" +
    encodeURIComponent(message);

    document.getElementById("whatsappBtn").href =
    whatsappLink;

}

</script>

</body>
</html>
