<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معايدة أفساك السنوية</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            overflow: hidden; /* يمنع السكرول أثناء حركة الستارة */
        }

        /* ----- 1. واجهة الستارة الترحيبية الكاملة ----- */
        .curtain-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            display: flex;
            pointer-events: none;
        }

        /* تصميم القماش وثنيات الستارة الفخمة بالـ Gradients */
        .curtain-half {
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, 
                #073524 0%, #0d5c3f 15%, #09422d 30%, 
                #0d5c3f 45%, #073524 60%, #0d5c3f 75%, 
                #09422d 90%, #073524 100%);
            background-size: 25% 100%;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.6);
            pointer-events: auto;
            /* حركة ناعمة جداً وبطيئة تليق بافتتاحية المسرح */
            transition: transform 2.2s cubic-bezier(0.66, 0, 0.2 squeeze, 1), opacity 1.8s ease;
        }

        .left-curtain { transform-origin: left center; }
        .right-curtain { transform-origin: right center; }

        /* حركة الفتح الحقيقية: انكماش تدريجي جانبي مذهل */
        .curtain-wrapper.open .left-curtain { 
            transform: scaleX(0) skewY(-4deg); 
            opacity: 0; 
        }
        .curtain-wrapper.open .right-curtain { 
            transform: scaleX(0) skewY(4deg); 
            opacity: 0; 
        }

        /* المحتويات فوق الستارة (مرحلة ما قبل الفتح) */
        .curtain-welcome-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            text-align: center;
            width: 100%;
            transition: opacity 0.8s ease, transform 0.8s ease;
            pointer-events: auto;
        }

        /* حركة وفلترة برمجية مبتكرة لإلغاء الخلفية البيضاء للملف logo.png تماماً */
        .curtain-welcome-box img {
            width: 140px;
            margin-bottom: 20px;
            /* عزل متطور للخلفية البيضاء للصورة المربعة لتصبح دائرية نظيفة */
            clip-path: circle(49% at 50% 50%);
            background: transparent;
            filter: drop-shadow(0px 6px 12px rgba(0,0,0,0.5));
        }

        .curtain-welcome-text {
            color: #fff;
            font-size: 25px;
            font-weight: 700;
            text-shadow: 0 3px 6px rgba(0,0,0,0.6);
        }

        /* تلاشي واختفاء النصوص الترحيبية بلطف عند بدء حركة الانفتاح */
        .curtain-wrapper.open .curtain-welcome-box {
            opacity: 0;
            transform: translate(-50%, -55%) scale(0.85);
            pointer-events: none;
        }


        /* ----- 2. الصفحة الأولى (المربع الأبيض بعد الفتح) ----- */
        .first-page {
            width: 90%;
            max-width: 410px;
            background: #fff;
            padding: 35px 25px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: block;
            z-index: 1;
            /* دخول تدريجي أنيق للمربع الأبيض بعد زوال الستارة */
            animation: fadeInBox 1.2s ease forwards;
        }

        @keyframes fadeInBox {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .first-page .logo {
            width: 105px;
            margin-bottom: 15px;
        }

        .first-page .title {
            font-size: 23px;
            font-weight: 700;
            margin-bottom: 25px;
            color: #0b1a30;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #e0e0e0;
            font-size: 17px;
            outline: none;
            margin-bottom: 25px;
            text-align: center;
            color: #333;
            background: #fafafa;
        }

        .show-btn {
            background: #0d5c3f;
            color: #fff;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(13, 92, 63, 0.2);
        }


        /* ----- 3. الصفحة الثالثة (عرض الكارت والاسم والمحافظة على الأبعاد) ----- */
        .second-page {
            display: none; 
            width: 100vw;
            max-width: 500px;
            text-align: center;
            padding: 10px;
        }

        .card-container {
            width: 100%;
            position: relative;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .card-container img {
            width: 100%;
            height: auto; /* الحفاظ المطلق على أبعاد الكارت الأصلية النظيفة ومنع المط */
            display: block;
        }

        /* تموضع الاسم بدقة بالملي في الفراغ الأبيض المتاح */
        .name-box {
            position: absolute;
            bottom: 9.5%; 
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            color: #000;
            padding: 0 15px;
            direction: rtl;
        }

        .save-btn {
            background: #107c41;
            color: #fff;
            margin-top: 15px;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(16, 124, 65, 0.3);
        }
    </style>
</head>

<body>

    <div class="curtain-wrapper" id="curtainWrapper">
        <div class="curtain-welcome-box">
            <img src="logo.png" alt="لوجو أفساك">
            <div class="curtain-text curtain-welcome-text">مرحبا بكم في أفساك</div>
        </div>
        <div class="curtain-half left-curtain"></div>
        <div class="curtain-half right-curtain"></div>
    </div>

    <section class="first-page" id="firstPage">
        <img src="logo.png" class="logo" alt="الشعار">
        <div class="title">معايدة أفساك السنوية</div>
        <input type="text" id="nameInput" placeholder="اكتب الاسم هنا" maxlength="40">
        <button class="show-btn" onclick="showGreeting()">عرض المعايدة</button>
    </section>

    <section class="second-page" id="secondPage">
        <div class="card-container" id="cardCapture">
            <img src="Card.jpg" alt="بطاقة التهنئة">
            <div class="name-box" id="userName"></div>
        </div>
        <button class="save-btn" onclick="downloadCard()">حفظ المعايدة كصورة 💾</button>
    </section>

    <script>
        // بدء عملية افتتاح الستارة الموزونة بعد ثانيتين كاملتين لتأمل الواجهة واللوجو المفرغ
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const curtainWrapper = document.getElementById('curtainWrapper');
                curtainWrapper.classList.add('open');
                
                // السماح بالتحرك الطبيعي بالصفحة بعد الفتح الكامل
                setTimeout(() => {
                    document.body.style.overflow = 'auto';
                }, 2200);
            }, 2000); // إعطاء هيبة ووقت للواجهة الترحيبية قبل السحب والفتح الجانبي
        });

        function showGreeting() {
            let enteredName = document.getElementById("nameInput").value.trim();

            if (enteredName === "") {
                alert("الرجاء كتابة الاسم أولاً لعرض المعايدة.");
                return;
            }

            document.getElementById("userName").innerText = enteredName;
            document.getElementById("firstPage").style.display = "none";
            document.getElementById("secondPage").style.display = "block";
            
            window.scrollTo(0, 0);
        }

        // دالة التقاط وحفظ الكارت بجودة فائقة
        function downloadCard() {
            let enteredName = document.getElementById("nameInput").value.trim();
            const cardElement = document.getElementById('cardCapture');
            const saveBtn = document.querySelector('.save-btn');
            
            saveBtn.innerText = "جاري التحضير والحفظ...";
            saveBtn.style.opacity = "0.7";

            html2canvas(cardElement, {
                useCORS: true,
                scale: 3, 
                allowTaint: true
            }).then(canvas => {
                const image = canvas.toDataURL('image/jpeg', 1.0);
                const link = document.createElement('a');
                link.download = `معايدة_أفساك_${enteredName}.jpg`;
                link.href = image;
                link.click();

                saveBtn.innerText = "حفظ المعايدة كصورة 💾";
                saveBtn.style.opacity = "1";
            }).catch(err => {
                alert("عذراً، حدث خطأ أثناء الحفظ، يرجى المحاولة مجدداً.");
                saveBtn.innerText = "حفظ المعايدة كصورة 💾";
                saveBtn.style.opacity = "1";
            });
        }
    </script>

</body>
</html>
